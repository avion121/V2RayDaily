# Run V2Ray fetcher; commit only strictly verified, working nodes (Canada → USA → UK).
# For automatic runs every 15 min: use cron-job.org to POST to GitHub API.
name: Update V2Ray config (Strict CA, US, UK)

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      # Updated to match your new Python script name
      - "ca_us_uk_v2ray_fetcher.py"
      - ".github/workflows/update-v2ray-config.yml"
  workflow_dispatch:  # Allow manual run from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow push to commit the generated file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Installed requests as required by the script
        run: pip install requests

      - name: Run V2Ray fetcher (Strictly CA, US, UK working nodes only)
        # Updated to run the new python script
        run: python ca_us_uk_v2ray_fetcher.py

      - name: Commit and push if config changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Updated to target the new output file
          git add hiddify_ca_us_uk.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Updated the commit message to reflect the new strict countries
            git commit -m "chore: update hiddify_ca_us_uk.txt (working nodes, CA → US → UK)"
            git push
          fi
