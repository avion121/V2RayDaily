name: Update V2Ray config (Strict CA, US, UK)

concurrency:
  group: v2ray-update
  cancel-in-progress: false 

on:
  schedule:
    # UPDATED: This runs every 15 minutes
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      - "america_europe_V2RayProxy.py"
      - ".github/workflows/update-v2ray-config.yml"
      - "requirements_v2ray_proxy.txt"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements_v2ray_proxy.txt

      - name: Run V2Ray fetcher
        run: python america_europe_V2RayProxy.py

      - name: Commit and push if config changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hiddify_ca_us_uk.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update hiddify_ca_us_uk.txt"
            git push
          fi
