# Run V2Ray fetcher on schedule + push; commit only working, sorted nodes (America → UK → rest).
# Note: GitHub's 5-min schedule is often delayed/skipped; 15 min is more reliable. For true 5 min, use cron-job.org + workflow_dispatch.
name: Update V2Ray config (America → UK → rest)

on:
  schedule:
    # Every 15 minutes (more reliable than */5 on GitHub; change to "*/5 * * * *" if you prefer)
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      - "america_europe_V2RayProxy.py"
      - ".github/workflows/update-v2ray-config.yml"
  workflow_dispatch:  # Allow manual run from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow push to commit the generated file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run V2Ray fetcher (working nodes only, sorted America → UK → rest)
        run: python america_europe_V2RayProxy.py

      - name: Commit and push if config changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hiddify_america_europe.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update hiddify_america_europe.txt (working nodes, America → UK → rest)"
            git push
          fi
